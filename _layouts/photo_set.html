---
layout: base
---

<article class="photo-set">
  <header class="photo-set-header">
    <h1>{{ page.title }}</h1>
    <div class="photo-set-meta">
      {% if page.date %}
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
      {% endif %}
      {% if page.location %}
        <span>{{ page.location }}</span>
      {% endif %}
    </div>
  </header>

  <div class="photo-set-content">
    {{ content }}
  </div>

  {% if page.images %}
    <div class="photo-set-grid">
      {% for image in page.images %}
        <figure class="photo-set-item">
          <img src="{{ image.src | relative_url }}" alt="{{ image.alt | default: page.title }}">
          {% if image.caption %}
            <figcaption>{{ image.caption }}</figcaption>
          {% endif %}
        </figure>
      {% endfor %}
    </div>
  {% endif %}
</article>
