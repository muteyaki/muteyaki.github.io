---
layout: base
---

<article class="photo-set">
  <header class="photo-set-header">
    <h1>{{ page.title }}</h1>
    <div class="photo-set-meta">
      {% if page.date %}
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
      {% endif %}
      {% if page.location %}
        <span>{{ page.location }}</span>
      {% endif %}
    </div>
  </header>

  <div class="photo-set-content">
    {{ content }}
  </div>

  {% if page.images %}
    <div class="photo-set-grid">
      {% for image in page.images %}
        <figure class="photo-set-item">
          {% assign image_alt = image.alt | default: page.title %}
          <button
            class="photo-set-image-button"
            type="button"
            data-lightbox-src="{{ image.src | relative_url }}"
            data-lightbox-alt="{{ image_alt | escape }}"
            data-lightbox-caption="{{ image.caption | escape }}"
            data-lightbox-index="{{ forloop.index0 }}"
            aria-label="Open image: {{ image_alt | escape }}"
          >
            <img src="{{ image.src | relative_url }}" alt="{{ image_alt }}">
          </button>
          {% if image.caption %}
            <figcaption>{{ image.caption }}</figcaption>
          {% endif %}
        </figure>
      {% endfor %}
    </div>

    <div class="photo-lightbox" id="photo-lightbox" aria-hidden="true">
      <button class="photo-lightbox-close" type="button" aria-label="Close image">&times;</button>
      <button class="photo-lightbox-nav photo-lightbox-prev" type="button" aria-label="Previous image">&#8249;</button>
      <img class="photo-lightbox-image" src="" alt="">
      <button class="photo-lightbox-nav photo-lightbox-next" type="button" aria-label="Next image">&#8250;</button>
      <p class="photo-lightbox-caption"></p>
    </div>

    <script>
      (function () {
        var lightbox = document.getElementById('photo-lightbox');
        if (!lightbox) return;

        var lightboxImage = lightbox.querySelector('.photo-lightbox-image');
        var lightboxCaption = lightbox.querySelector('.photo-lightbox-caption');
        var closeButton = lightbox.querySelector('.photo-lightbox-close');
        var prevButton = lightbox.querySelector('.photo-lightbox-prev');
        var nextButton = lightbox.querySelector('.photo-lightbox-next');
        var triggers = Array.prototype.slice.call(document.querySelectorAll('.photo-set-image-button'));
        var activeIndex = 0;

        if (triggers.length <= 1) {
          prevButton.style.display = 'none';
          nextButton.style.display = 'none';
        }

        function closeLightbox() {
          lightbox.setAttribute('aria-hidden', 'true');
          lightboxImage.removeAttribute('src');
          lightboxImage.setAttribute('alt', '');
          lightboxCaption.textContent = '';
          document.body.classList.remove('photo-lightbox-open');
        }

        function showImage(index) {
          activeIndex = (index + triggers.length) % triggers.length;
          var trigger = triggers[activeIndex];
          lightboxImage.setAttribute('src', trigger.getAttribute('data-lightbox-src'));
          lightboxImage.setAttribute('alt', trigger.getAttribute('data-lightbox-alt') || '');
          lightboxCaption.textContent = trigger.getAttribute('data-lightbox-caption') || '';
        }

        function openLightbox(trigger) {
          showImage(parseInt(trigger.getAttribute('data-lightbox-index'), 10) || 0);
          lightbox.setAttribute('aria-hidden', 'false');
          document.body.classList.add('photo-lightbox-open');
          closeButton.focus();
        }

        function showPreviousImage() {
          showImage(activeIndex - 1);
        }

        function showNextImage() {
          showImage(activeIndex + 1);
        }

        triggers.forEach(function (trigger) {
          trigger.addEventListener('click', function () {
            openLightbox(trigger);
          });
        });

        closeButton.addEventListener('click', closeLightbox);
        prevButton.addEventListener('click', showPreviousImage);
        nextButton.addEventListener('click', showNextImage);

        lightbox.addEventListener('click', function (event) {
          if (event.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', function (event) {
          if (lightbox.getAttribute('aria-hidden') === 'true') return;

          if (event.key === 'Escape') {
            closeLightbox();
          } else if (event.key === 'ArrowLeft') {
            showPreviousImage();
          } else if (event.key === 'ArrowRight') {
            showNextImage();
          }
        });
      })();
    </script>
  {% endif %}
</article>
